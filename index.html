<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolonilotten – Linköping</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #1a1a1a; display: flex; min-height: 100vh; }

  nav {
    width: 220px;
    min-width: 220px;
    background: #0C447C;
    color: #fff;
    padding: 2rem 0;
    min-height: 100vh;
  }

  .nav-logo {
    padding: 0 1.25rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    margin-bottom: 1rem;
  }
  .nav-logo h1 { font-size: 1.2rem; font-weight: 500; }
  .nav-logo p { font-size: 0.8rem; opacity: 0.65; margin-top: 3px; }

  .nav-section {
    padding: 0.5rem 1.25rem 0.25rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.5;
  }

  .nav-item {
    display: block;
    padding: 0.6rem 1.25rem;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 0.95rem;
    transition: background 0.15s, color 0.15s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border-left-color: rgba(255,255,255,0.5);
  }
  .nav-item .icon { margin-right: 8px; }
  .nav-item.disabled { opacity: 0.4; cursor: default; pointer-events: none; }

  main {
    flex: 1;
    padding: 2.5rem 2rem;
  }

  .welcome h2 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.75rem; }
  .welcome p { color: #555; line-height: 1.7; max-width: 560px; }

  @media (max-width: 600px) {
    body { flex-direction: column; }
    nav { width: 100%; min-height: auto; padding: 1rem 0; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <h1>🌿 Kolonilotten</h1>
    <p>Linköping</p>
  </div>

  <div class="nav-section">Projekt</div>
  <a class="nav-item" href="https://kolonilott95.github.io/Kolonistugan/">
    <span class="icon">🏡</span>Kolonistugan
  </a>
  <a class="nav-item disabled" href="#">
    <span class="icon">🌿</span>Trädgård
  </a>
</nav>

<main>
  <div class="welcome">
    <h2>Välkommen till kolonilotten</h2>
    <p>Här samlar jag projekt och dagböcker från min kolonilott i Linköping. Välj ett projekt i menyn.</p>
  </div>
</main>

</body>
</html>
